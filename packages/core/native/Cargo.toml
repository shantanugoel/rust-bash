[package]
name = "rust-bash-native"
version = "0.7.0"
edition = "2024"
description = "Native Node.js addon for rust-bash via napi-rs"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3.8.3", default-features = false, features = ["napi8", "serde-json"] }
napi-derive = "3.5.2"
rust-bash = { path = "../../..", default-features = false, features = ["network"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
napi-build = "2.3.1"

[profile.release]
lto = true
strip = true
