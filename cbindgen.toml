language = "C"
include_guard = "RUST_BASH_H"
tab_width = 4
documentation_style = "c99"
style = "both"
cpp_compat = true

header = "/* Auto-generated by cbindgen. Do not edit manually.\n * Regenerate with: cbindgen --config cbindgen.toml --crate rust-bash --output include/rust_bash.h\n */"

[export]
include = ["CExecResult"]

[export.rename]
"CExecResult" = "ExecResult"
