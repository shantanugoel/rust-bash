# M6.10 — Advanced redirections (mostly xfail)

[[cases]]
name = "exec_persistent_stdout_redirect"
script = '''
exec > /tmp/out.txt
echo hello
exec > /dev/stdout
cat /tmp/out.txt
'''
stdout = "hello\n"
stderr = ""
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "exec_redirect"
reason = "exec persistent redirection not implemented"

[[cases]]
name = "dev_stdin_passthrough"
script = 'echo "via stdin" | cat /dev/stdin'
stdout = "via stdin\n"
stderr = ""
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "dev_stdin"
reason = "/dev/stdin passthrough not implemented"

[[cases]]
name = "dev_stdout_passthrough"
script = 'echo hello > /dev/stdout'
stdout = "hello\n"
stderr = ""
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "dev_stdout"
reason = "/dev/stdout not available in VFS"

[[cases]]
name = "dev_stderr_passthrough"
script = 'echo err > /dev/stderr'
stdout = ""
stderr = "err\n"
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "dev_stderr"
reason = "/dev/stderr not available in VFS"

[[cases]]
name = "dev_zero_read"
script = 'head -c 4 /dev/zero | od -An -tx1 | tr -d " "'
stdout = "00000000\n"
stderr = ""
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "dev_zero"
reason = "/dev/zero read not implemented"

[[cases]]
name = "dev_full_write_error"
script = 'echo data > /dev/full 2>&1; echo $?'
stdout = "1\n"
stderr_ignore = true
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "dev_full"
reason = "/dev/full write error not implemented"

[[cases]]
name = "fd_variable_allocation"
script = 'exec {fd}>/tmp/dynfd.txt; echo "test" >&$fd; exec {fd}>&-; cat /tmp/dynfd.txt'
stdout = "test\n"
stderr = ""
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "fd_allocation"
reason = "dynamic FD allocation not implemented"

[[cases]]
name = "read_write_fd"
script = '''
echo "initial" > /tmp/rw.txt
exec 3<>/tmp/rw.txt
read -r line <&3
echo "$line"
exec 3>&-
'''
stdout = "initial\n"
stderr = ""
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "read_write_fd"
reason = "<> read-write FD not implemented"

[[cases]]
name = "fd_move_close"
script = '''
exec 3>/tmp/move.txt
echo hello >&3
exec 4>&3-
echo world >&4
exec 4>&-
cat /tmp/move.txt
'''
stdout = "hello\nworld\n"
stderr = ""
exit_code = 0
status = "xfail"
milestone = "M6.10"
feature = "fd_move"
reason = "FD move (N>&M-) not implemented"

[[cases]]
name = "pipe_stderr_with_bar_and"
script = 'echo err >&2 |& cat'
stdout = "err\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "pipe_stderr"
