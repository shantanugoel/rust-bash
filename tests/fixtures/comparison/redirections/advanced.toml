# M6.10 — Advanced redirections

[[cases]]
name = "exec_persistent_stdout_redirect"
script = '''
exec > /out.txt
echo hello
exec > /dev/stdout
cat /out.txt
'''
stdout = "hello\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "exec_redirect"

[[cases]]
name = "dev_stdin_passthrough"
script = 'echo "via stdin" | cat /dev/stdin'
stdout = "via stdin\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "dev_stdin"

[[cases]]
name = "dev_stdout_passthrough"
script = 'echo hello > /dev/stdout'
stdout = "hello\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "dev_stdout"

[[cases]]
name = "dev_stderr_passthrough"
script = 'echo err > /dev/stderr'
stdout = ""
stderr = "err\n"
exit_code = 0
milestone = "M6.10"
feature = "dev_stderr"

[[cases]]
name = "dev_zero_read"
script = 'head -c 4 /dev/zero | od -An -tx1 | tr -d " "'
stdout = "00000000\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "dev_zero"

[[cases]]
name = "dev_full_write_error"
script = 'echo data > /dev/full 2>&1; echo $?'
stdout = "1\n"
stderr_ignore = true
exit_code = 0
milestone = "M6.10"
feature = "dev_full"

[[cases]]
name = "fd_variable_allocation"
script = 'exec {fd}>/dynfd.txt; echo "test" >&$fd; exec {fd}>&-; cat /dynfd.txt'
stdout = "test\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "fd_allocation"

[[cases]]
name = "read_write_fd"
script = '''
echo "initial" > /rw.txt
exec 3<>/rw.txt
read -r line <&3
echo "$line"
exec 3>&-
'''
stdout = "initial\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "read_write_fd"

[[cases]]
name = "fd_move_close"
script = '''
exec 3>/move.txt
echo hello >&3
exec 4>&3-
echo world >&4
exec 4>&-
cat /move.txt
'''
stdout = "hello\nworld\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "fd_move"

[[cases]]
name = "pipe_stderr_with_bar_and"
script = 'echo err >&2 |& cat'
stdout = "err\n"
stderr = ""
exit_code = 0
milestone = "M6.10"
feature = "pipe_stderr"
