# M6.9 — Shell option enforcement via set

[[cases]]
name = "set_x_emits_trace"
script = '''
set -x
echo hello
'''
stdout = "hello\n"
stderr_contains = "+ echo hello"
exit_code = 0
milestone = "M6.9"
feature = "set.xtrace"

[[cases]]
name = "set_x_pipeline_trace"
script = '''
set -x
echo a | cat
'''
stdout = "a\n"
stderr_contains = "+ echo a"
exit_code = 0
milestone = "M6.9"
feature = "set.xtrace"

[[cases]]
name = "set_v_verbose_echoes_input"
script = '''
set -v
echo hello
'''
stdout = "hello\n"
stderr_ignore = true
exit_code = 0
milestone = "M6.9"
feature = "set.verbose"

[[cases]]
name = "set_n_noexec"
script = '''
set -n
echo "should not appear"
'''
stdout = ""
stderr = ""
exit_code = 0
milestone = "M6.9"
feature = "set.noexec"

[[cases]]
name = "set_C_noclobber"
script = '''
echo first > /tmp/nc.txt
set -C
echo second > /tmp/nc.txt 2>&1
echo $?
cat /tmp/nc.txt
'''
files = { "/tmp/.keep" = "" }
stdout = "1\nfirst\n"
stderr_ignore = true
exit_code = 0
milestone = "M6.9"
feature = "set.noclobber"

[[cases]]
name = "set_C_force_override"
script = '''
echo first > /tmp/nc2.txt
set -C
echo second >| /tmp/nc2.txt
cat /tmp/nc2.txt
'''
files = { "/tmp/.keep" = "" }
stdout = "second\n"
stderr = ""
exit_code = 0
milestone = "M6.9"
feature = "set.noclobber"

[[cases]]
name = "set_a_allexport"
script = '''
set -a
MY_VAR=exported
env | grep MY_VAR
'''
stdout = "MY_VAR=exported\n"
stderr = ""
exit_code = 0
milestone = "M6.9"
feature = "set.allexport"

[[cases]]
name = "set_f_noglob"
script = '''
set -f
echo *.txt
'''
files = { "/a.txt" = "", "/b.txt" = "" }
stdout = "*.txt\n"
stderr = ""
exit_code = 0
milestone = "M6.9"
feature = "set.noglob"

[[cases]]
name = "set_o_posix_accepts_flag"
script = '''
set -o posix
echo $?
'''
stdout = "0\n"
stderr = ""
exit_code = 0
milestone = "M6.9"
feature = "set.posix"
