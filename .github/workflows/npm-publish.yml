name: Publish npm Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
      - run: cd packages/core && npm ci && npm test

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli
      - name: Build WASM
        run: ./scripts/build-wasm.sh
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifact
          path: packages/core/wasm/
          retention-days: 1

  build-native:
    # NOTE: This currently builds the C FFI shared library (--features ffi), not
    # a napi-rs native Node addon (.node). When napi-rs integration is added,
    # this job should be updated to produce platform-specific .node files.
    name: Build Native - ${{ matrix.settings.target }}
    needs: test
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc  # best-effort: cross-compilation may require additional setup
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}
      - name: Install cross-compilation tools
        if: matrix.settings.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build native addon
        run: |
          cargo build --release --target ${{ matrix.settings.target }} --features ffi
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.settings.target }}
          path: |
            target/${{ matrix.settings.target }}/release/librust_bash.so
            target/${{ matrix.settings.target }}/release/librust_bash.dylib
            target/${{ matrix.settings.target }}/release/rust_bash.dll
          if-no-files-found: ignore
          retention-days: 1

  publish:
    name: Publish to npm
    needs: [build-wasm, build-native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/core/package-lock.json

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifact
          path: packages/core/wasm/

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: packages/core/native/
          merge-multiple: true

      - name: Install dependencies and build
        working-directory: packages/core
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
