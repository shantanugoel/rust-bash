name: Publish npm Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
      - run: cargo test
      - run: cd packages/core && npm ci && npm test

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          rust-targets: wasm32-unknown-unknown
          rust-cache-key: wasm
      - uses: cargo-bins/cargo-binstall@main
      - name: Install wasm-bindgen-cli
        run: cargo binstall --no-confirm --locked wasm-bindgen-cli@0.2.114
      - name: Build WASM
        run: ./scripts/build-wasm.sh
      - name: Copy WASM artifacts into package
        run: |
          mkdir -p packages/core/wasm
          cp pkg/rust_bash.js packages/core/wasm/
          cp pkg/rust_bash_bg.wasm packages/core/wasm/
          cp pkg/rust_bash.d.ts packages/core/wasm/
          cp pkg/rust_bash_bg.wasm.d.ts packages/core/wasm/
      - name: Verify package tests with bundled WASM
        working-directory: packages/core
        run: |
          npm ci
          npm test
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifact
          path: packages/core/wasm/
          retention-days: 1

  build-native:
    name: Build Native - ${{ matrix.settings.target }}
    needs: test
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-26-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          rust-targets: ${{ matrix.settings.target }}
          rust-cache-key: ${{ matrix.settings.target }}
          node: 'false'
      - name: Build native addon
        run: |
          cargo build \
            --manifest-path packages/core/native/Cargo.toml \
            --release \
            --target ${{ matrix.settings.target }}
      - name: Stage packaged native addon
        run: |
          bash ./scripts/stage-native-addon.sh ${{ matrix.settings.target }}
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.settings.target }}
          path: packages/core/native/*.node
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to npm
    needs: [build-wasm, build-native]
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          node-registry-url: https://registry.npmjs.org

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifact
          path: packages/core/wasm/

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: packages/core/native/
          merge-multiple: true

      - name: Install dependencies and build
        working-directory: packages/core
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: packages/core
        run: npm publish --access public
