name: Deploy Website

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Optional full commit SHA to deploy. Leave empty to deploy the tip of the selected ref.
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.commit_sha || github.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install --locked wasm-bindgen-cli --version 0.2.114

      - name: Build WASM
        run: ./scripts/build-wasm.sh

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/website/package-lock.json

      - name: Build website
        working-directory: examples/website
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.79.0"
          command: pages deploy dist/ --project-name=rustbashweb --branch=main
          workingDirectory: examples/website
