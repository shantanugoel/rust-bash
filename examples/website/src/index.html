      <!-- Main app container (hidden until intro finishes) -->

          </a>
        </header>

        <main id="terminal-container">
          <div id="terminal"></div>
        </main>

        <footer id="footer">
          <span>MIT</span>
          <span class="footer-sep">·</span>
          <span>Built in Rust</span>
          <span class="footer-sep">·</span>
          <span>Runs Everywhere</span>
        </footer>
      </div>
    </div>

    <!-- Power LED -->
    <div class="bezel-bottom">
      <div class="power-led"></div>
    </div>
  </div>
